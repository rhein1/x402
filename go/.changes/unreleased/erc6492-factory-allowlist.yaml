kind: Fixed
body: "**[Breaking for facilitator implementers using ERC-4337 smart wallet deployment]**\
  \ Fixed ERC-6492 factory call injection vulnerability in EVM exact settlement (v1\
  \ and v2) and simplified the configuration API. The `DeployERC4337WithEIP6492`\
  \ bool field has been removed from `ExactEvmSchemeConfig` and `ExactEvmSchemeV1Config`.\
  \ `EIP6492AllowedFactories []string` is now the sole gate: settlement deploys an\
  \ undeployed smart wallet if and only if its factory address is present in the allowlist\
  \ (case-insensitive). An empty or nil list disables the feature entirely and returns\
  \ `eip6492_factory_not_allowed`. Facilitators previously using `DeployERC4337WithEIP6492:\
  \ true` must remove that field and populate `EIP6492AllowedFactories` with every\
  \ factory address they trust."
time: "2026-05-26T00:00:00Z"
